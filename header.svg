<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
          background: #0d1117;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 200px;
          border: 1px solid #7000ff;
          box-shadow: 0 0 10px #7000ff, inset 0 0 5px #00f2ff;
          position: relative;
          overflow: hidden;
          color: #fff;
          font-size: 2.5rem;
          font-weight: bold;
          white-space: nowrap; /* Запрещаем перенос строки */
        }

        /* Глюки фона */
        .glitch-block {
          position: absolute;
          width: 30px;
          height: 30px;
          opacity: 0;
          animation: noise-block 2s infinite;
        }
        .gb-purple { background: rgba(112, 0, 255, 0.4); top: 10%; left: 15%; animation-delay: 0.5s; }
        .gb-cyan   { background: rgba(0, 242, 255, 0.3); bottom: 15%; right: 20%; animation-delay: 1.2s; width: 50px; height: 10px; }
        .gb-white  { background: rgba(255, 255, 255, 0.2); top: 50%; right: 10%; animation-delay: 0.1s; width: 15px; height: 40px; }
        .gb-magenta { background: rgba(255, 0, 193, 0.3); bottom: 10%; left: 10%; animation-delay: 1.5s; }

        @keyframes noise-block {
          0%, 90%, 100% { opacity: 0; transform: scale(1); }
          92% { opacity: 1; transform: scale(1.3) translate(5px, -5px); }
          95% { opacity: 0; }
          97% { opacity: 0.8; transform: scale(0.7) translate(-15px, 10px); }
        }

        .glitch-line {
          position: absolute;
          width: 100%;
          height: 1px;
          opacity: 0;
          animation: line-flash 3s infinite;
        }
        .gl-cyan    { top: 20%; background: rgba(0, 242, 255, 0.4); animation-delay: 0.1s; }
        .gl-magenta { top: 80%; background: rgba(255, 0, 193, 0.4); animation-delay: 1.1s; }
        .gl-white   { top: 45%; background: rgba(255, 255, 255, 0.3); animation-delay: 0.8s; height: 2px; }

        @keyframes line-flash {
          0%, 95%, 100% { opacity: 0; }
          96% { opacity: 1; transform: scaleY(3) translateX(-20px); }
          98% { opacity: 0; }
        }

        .scanline {
          width: 100%;
          height: 2px;
          background: rgba(0, 242, 255, 0.1);
          position: absolute;
          animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        /* Текст и Глюки */
        .text-wrapper { position: relative; }
        .base-text { color: #fff; text-shadow: 0 0 5px rgba(255, 255, 255, 0.5); }

        .red-layer {
          color: #ff00c1;
          position: absolute;
          top: 0;
          left: -2px;
          animation: glitch-red 0.7s infinite alternate-reverse;
          width: 100%;
        }

        .blue-layer {
          color: #00f2ff;
          position: absolute;
          top: 0;
          left: 2px;
          animation: glitch-blue 1.8s infinite;
          width: 100%;
        }

        @keyframes glitch-red {
          0% { clip-path: inset(0 0 0 0); transform: translate(0); }
          15% { clip-path: inset(10% 0 70% 0); transform: translate(-8px, 3px); }
          30% { clip-path: inset(0 0 0 0); transform: translate(0); }
          45% { clip-path: inset(60% 0 10% 0); transform: translate(8px, -3px); }
          100% { clip-path: inset(0 0 0 0); transform: translate(0); }
        }

        @keyframes glitch-blue {
          0%, 60%, 100% { opacity: 1; transform: translate(0); clip-path: inset(0 0 0 0); }
          62% { opacity: 0.8; transform: translate(12px, -8px); clip-path: inset(5% 0 80% 0); }
          64% { opacity: 1; transform: translate(-12px, 4px); clip-path: inset(70% 0 5% 0); }
          66% { transform: translate(0); }
          68% { opacity: 0.7; transform: translate(5px, 8px); clip-path: inset(40% 0 40% 0); }
        }

        /* Анимация курсора */
        .cursor {
          display: inline-block;
          width: 15px;
          animation: blink 0.8s infinite;
          margin-left: 5px;
        }
        @keyframes blink {
          0%, 100% { opacity: 1; }
          50% { opacity: 0; }
        }
      </style>
      <div class="container">
        <div class="glitch-block gb-purple"></div>
        <div class="glitch-block gb-cyan"></div>
        <div class="glitch-block gb-white"></div>
        <div class="glitch-block gb-magenta"></div>
        
        <div class="glitch-line gl-cyan"></div>
        <div class="glitch-line gl-magenta"></div>
        <div class="glitch-line gl-white"></div>
        
        <div class="scanline"></div>
        <div class="text-wrapper">
          <div class="base-text">root@ZeroDivision:~# init<span class="cursor">_</span></div>
          <div class="red-layer">root@ZeroDivision:~# init<span class="cursor">_</span></div>
          <div class="blue-layer">root@ZeroDivision:~# init<span class="cursor">_</span></div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>